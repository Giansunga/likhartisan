name: likhartisan-api
type: web
env: node
buildCommand: npm install
startCommand: npm start
rootDir: server
plan: free
envVars:
  - key: NODE_ENV
    value: production
  - key: SUPABASE_URL
    sync: false
  - key: SUPABASE_SERVICE_KEY
    sync: false
  - key: PAYMONGO_SECRET_KEY
    sync: false
  - key: PAYMONGO_PUBLIC_KEY
    sync: false
  - key: PAYMONGO_WEBHOOK_SECRET
    sync: false
  - key: GROQ_API_KEY
    sync: false
  - key: LALAMOVE_API_KEY
    sync: false
  - key: LALAMOVE_API_SECRET
    sync: false
  - key: LALAMOVE_MARKET
    value: PH
  - key: GOOGLE_MAPS_API_KEY
    sync: false
  - key: FRONTEND_URL
    value: https://likhartisan.vercel.app
